services:
  - type: web
    name: smart-ai-support-assistant-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install uv && uv sync
    startCommand: uv run uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # Set manually in Render dashboard → Environment
      - key: ALLOWED_ORIGINS
        value: "*" # Replace with your Vercel frontend URL before final deploy
